<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>端午龙舟竞速挑战赛</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/pixi.js/7.2.4/pixi.min.js"></script>
    <script src="https://lf26-cdn-tos.bytecdntp.com/cdn/expire-1-M/supabase/2.0.0-rc.10/supabase.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #0088cc; touch-action: none; font-family: "Microsoft YaHei", sans-serif; }
        #ui-header { position: absolute; top: 0; width: 100%; height: 80px; background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent); color: white; display: flex; justify-content: space-around; align-items: center; z-index: 10; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 12px; opacity: 0.8; }
        .stat-value { font-size: 24px; font-weight: bold; font-variant-numeric: tabular-nums; }
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        #start-btn { padding: 15px 50px; font-size: 24px; font-weight: bold; color: white; background: #ff9f1c; border: none; border-radius: 50px; box-shadow: 0 6px 0 #e67e22; cursor: pointer; }
        #start-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #e67e22; }
        #countdown { display: none; font-size: 120px; font-weight: bold; color: #fff; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #guide { position: fixed; bottom: 15%; width: 100%; text-align: center; color: white; z-index: 5; pointer-events: none; display: none; }
        #result-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #fff; width: 85%; padding: 30px; border-radius: 20px; text-align: center; box-sizing: border-box; }
        .score-display { font-size: 48px; color: #e63946; font-weight: bold; margin: 20px 0; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 10px; font-size: 18px; box-sizing: border-box; outline: none; }
        .submit-btn { width: 100%; background: #e63946; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 20px; font-weight: bold; box-shadow: 0 4px 0 #b2202c; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="margin-bottom: 40px; text-shadow: 0 4px 10px rgba(0,0,0,0.3);">端午龙舟赛</h1>
        <button id="start-btn" onclick="preStart()">开始游戏</button>
        <div id="countdown">3</div>
    </div>

    <div id="ui-header">
        <div class="stat-item"><div class="stat-label">进度</div><div class="stat-value"><span id="prog">0</span>%</div></div>
        <div class="stat-item"><div class="stat-label">耗时</div><div class="stat-value"><span id="time">0.00</span>s</div></div>
    </div>

    <div id="guide">
        <div style="font-size: 18px; margin-bottom: 10px;">快速左右交替点击</div>
        <div style="font-size: 30px;">👈 🚣 👉</div>
    </div>

    <div id="result-modal">
        <div class="modal-content">
            <h2 style="margin:0;">冲过终点！</h2>
            <div class="score-display"><span id="final-time">0.00</span>s</div>
            <input type="text" id="user-name" placeholder="请输入您的姓名" maxlength="6">
            <button class="submit-btn" onclick="saveResult()">提交成绩</button>
        </div>
    </div>

    <script>
        // 数据库配置
        const SUPABASE_URL = 'https://hnppuispiploxwqwdfvm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_DaDWwW3v6QFfvRs-HvbzMA_fT8W_jsx';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const TOTAL_DIST = 4000; 
        let distance = 0, speed = 0, startTime = 0, lastSide = '', finished = false, isGaming = false;

        const app = new PIXI.Application({
            width: window.innerWidth, height: window.innerHeight,
            backgroundColor: 0x0088cc, antialias: true,
            resolution: window.devicePixelRatio || 1
        });
        document.body.appendChild(app.view);

        // 使用国内可访问的图片资源（由阿里 CDN 提供的占位图作为水纹参考，或者你可以换成你仓库里的图）
        const waterTex = PIXI.Texture.from('https://img.alicdn.com/imgextra/i4/O1CN01f8S0pG1Z8XpXpXpXp_!!6000000003148-2-tps-200-200.png'); 
        const water = new PIXI.TilingSprite(waterTex, app.screen.width, app.screen.height);
        app.stage.addChild(water);

        const boat = new PIXI.Container();
        const boatShape = new PIXI.Graphics();
        boatShape.beginFill(0xcc3300).drawRoundedRect(-20, -70, 40, 140, 20).endFill(); 
        boatShape.beginFill(0xffd700).drawCircle(0, -60, 15).endFill(); 
        boat.addChild(boatShape);
        boat.x = app.screen.width / 2; boat.y = app.screen.height - 180;
        app.stage.addChild(boat);

        function preStart() {
            document.getElementById('start-btn').style.display = 'none';
            const cdText = document.getElementById('countdown');
            cdText.style.display = 'block';
            let count = 3;
            const timer = setInterval(() => {
                count--;
                if (count > 0) cdText.innerText = count;
                else if (count === 0) cdText.innerText = "GO!";
                else { clearInterval(timer); startGame(); }
            }, 1000);
        }

        function startGame() {
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('ui-header').style.opacity = '1';
            document.getElementById('guide').style.display = 'block';
            isGaming = true; startTime = Date.now();
        }

        window.addEventListener('touchstart', (e) => {
            if (!isGaming || finished) return;
            document.getElementById('guide').style.display = 'none';
            const side = e.touches[0].clientX < window.innerWidth / 2 ? 'left' : 'right';
            if (side !== lastSide) { speed += 4.5; boat.scale.set(1.2, 0.8); }
            else { speed += 0.5; }
            lastSide = side;
        });

        app.ticker.add(() => {
            if (!isGaming || finished) return;
            speed *= 0.96; distance += speed; water.tilePosition.y += speed; 
            const now = (Date.now() - startTime) / 1000;
            document.getElementById('time').innerText = now.toFixed(2);
            document.getElementById('prog').innerText = Math.floor(Math.min(100, (distance / TOTAL_DIST) * 100));
            if (distance >= TOTAL_DIST) { finished = true; isGaming = false; showResult(now.toFixed(2)); }
            boat.scale.x += (1 - boat.scale.x) * 0.1;
            boat.scale.y += (1 - boat.scale.y) * 0.1;
        });

        function showResult(s) {
            document.getElementById('final-time').innerText = s;
            document.getElementById('result-modal').style.display = 'flex';
        }

        async function saveResult() {
            const name = document.getElementById('user-name').value.trim();
            if (!name) return alert("请输入大名！");
            const btn = document.querySelector('.submit-btn');
            btn.innerText = "提交中..."; btn.disabled = true;
            const { error } = await sb.from('ranks').insert([{ nickname: name, score: parseFloat(document.getElementById('final-time').innerText) }]);
            if (error) { alert("提交失败"); btn.innerText = "重新提交"; btn.disabled = false; }
            else { alert("提交成功！"); location.reload(); }
        }
    </script>
</body>
</html>
