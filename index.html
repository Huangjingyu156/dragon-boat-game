<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>端午龙舟竞速挑战赛</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/pixi.js/7.2.4/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #0088cc; touch-action: none; font-family: "Microsoft YaHei", sans-serif; }
        
        /* 顶部 UI */
        #ui-header { position: absolute; top: env(safe-area-inset-top, 0); width: 100%; height: 80px; background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent); color: white; display: flex; justify-content: space-around; align-items: center; z-index: 10; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 12px; opacity: 0.8; }
        .stat-value { font-size: 24px; font-weight: bold; font-variant-numeric: tabular-nums; }

        /* 底部控制按钮 - 针对移动端深度优化 */
        .controls { 
            position: fixed; 
            bottom: env(safe-area-inset-bottom, 30px); /* 适配全面屏底栏 */
            bottom: 40px; 
            left: 0;
            width: 100%; 
            display: none; /* 初始隐藏 */
            justify-content: space-around; 
            padding: 0 15px; 
            box-sizing: border-box; 
            z-index: 9999; /* 极高层级，确保在 PixiJS 之上 */
            opacity: 0; 
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .paddle-btn { 
            width: 100px; height: 100px; background: #ff9f1c; color: white; border: none; 
            border-radius: 50%; font-size: 18px; font-weight: bold; 
            box-shadow: 0 6px 0 #e67e22; cursor: pointer; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
            pointer-events: auto; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation; /* 禁用缩放手势提高响应速度 */
        }
        .paddle-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #e67e22; background: #f39c12; }
        .btn-icon { font-size: 28px; margin-bottom: 2px; pointer-events: none; }

        /* 遮罩层 */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        #start-btn { padding: 15px 50px; font-size: 24px; font-weight: bold; color: white; background: #ff9f1c; border: none; border-radius: 50px; box-shadow: 0 6px 0 #e67e22; cursor: pointer; }
        #countdown { display: none; font-size: 100px; font-weight: bold; color: #fff; }
        
        /* 结算弹窗 */
        #result-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10001; justify-content: center; align-items: center; }
        .modal-content { background: #fff; width: 85%; padding: 30px; border-radius: 20px; text-align: center; }
        .score-display { font-size: 48px; color: #e63946; font-weight: bold; margin: 20px 0; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 10px; font-size: 18px; box-sizing: border-box; }
        .submit-btn { width: 100%; background: #e63946; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="margin-bottom: 30px;">端午龙舟赛</h1>
        <button id="start-btn" onclick="preStart()">开始挑战</button>
        <div id="countdown">3</div>
    </div>

    <div id="ui-header">
        <div class="stat-item">
            <div class="stat-label">完成进度</div>
            <div class="stat-value"><span id="prog">0</span>%</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">用时</div>
            <div class="stat-value"><span id="time">0.00</span>s</div>
        </div>
    </div>

    <div class="controls" id="game-controls">
        <button class="paddle-btn" id="btn-left">
            <span class="btn-icon">🚣</span>
            <span>左桨</span>
        </button>
        <button class="paddle-btn" id="btn-right">
            <span class="btn-icon">🚣</span>
            <span>右桨</span>
        </button>
    </div>

    <div id="result-modal">
        <div class="modal-content">
            <h2>冲过终点！</h2>
            <div class="score-display"><span id="final-time">0.00</span>s</div>
            <input type="text" id="user-name" placeholder="请输入姓名" maxlength="6">
            <button class="submit-btn" onclick="saveResult()">提交成绩</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hnppuispiploxwqwdfvm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_DaDWwW3v6QFfvRs-HvbzMA_fT8W_jsx';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const TOTAL_DIST = 4000; 
        let distance = 0, speed = 0, startTime = 0, lastSide = '', finished = false, isGaming = false;

        const app = new PIXI.Application({
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundColor: 0x0088cc,
            antialias: true,
            resolution: window.devicePixelRatio || 1,
            autoDensity: true
        });
        document.body.appendChild(app.view);

        const water = new PIXI.TilingSprite(PIXI.Texture.WHITE, app.screen.width, app.screen.height);
        water.tint = 0x0077be;
        app.stage.addChild(water);

        const boat = new PIXI.Container();
        const boatShape = new PIXI.Graphics();
        boatShape.beginFill(0xcc3300).drawRoundedRect(-20, -70, 40, 140, 20).endFill(); 
        boatShape.beginFill(0xffd700).drawCircle(0, -60, 15).endFill(); 
        boat.addChild(boatShape);
        boat.x = app.screen.width / 2;
        boat.y = app.screen.height - 350; // 稍微上移，给底部按钮留出视觉空间
        app.stage.addChild(boat);

        function preStart() {
            document.getElementById('start-btn').style.display = 'none';
            const cd = document.getElementById('countdown');
            cd.style.display = 'block';
            let count = 3;
            let timer = setInterval(() => {
                count--;
                if(count > 0) cd.innerText = count;
                else if(count === 0) cd.innerText = "GO!";
                else {
                    clearInterval(timer);
                    startGame();
                }
            }, 1000);
        }

        function startGame() {
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('ui-header').style.opacity = '1';
            
            const controls = document.getElementById('game-controls');
            controls.style.display = 'flex'; // 显式显示
            setTimeout(() => {
                controls.style.opacity = '1';
                controls.style.pointerEvents = 'auto';
            }, 50);
            
            isGaming = true;
            finished = false;
            distance = 0;
            speed = 0;
            startTime = Date.now();
        }

        function handlePaddle(side) {
            if (!isGaming || finished) return;
            if (side !== lastSide) {
                speed += 6.0; // 针对移动端节奏略微调高动力
                boat.scale.set(1.2, 0.8);
            } else {
                speed += 0.5; 
            }
            lastSide = side;
        }

        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');

        // 使用 pointerdown 兼顾触摸屏和鼠标
        const addControlEvent = (el, side) => {
            el.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                handlePaddle(side);
            });
        };

        addControlEvent(btnLeft, 'left');
        addControlEvent(btnRight, 'right');

        app.ticker.add(() => {
            if (!isGaming || finished) return;

            speed *= 0.94; 
            distance += speed;
            water.tilePosition.y += speed; 

            const now = (Date.now() - startTime) / 1000;
            document.getElementById('time').innerText = now.toFixed(2);
            const p = Math.floor(Math.min(100, (distance / TOTAL_DIST) * 100));
            document.getElementById('prog').innerText = p;

            if (distance >= TOTAL_DIST) {
                finished = true;
                isGaming = false;
                document.getElementById('game-controls').style.opacity = '0';
                document.getElementById('game-controls').style.pointerEvents = 'none';
                showResult(now.toFixed(2));
            }

            boat.scale.x += (1 - boat.scale.x) * 0.1;
            boat.scale.y += (1 - boat.scale.y) * 0.1;
            boat.x = (app.screen.width / 2) + Math.sin(Date.now() / 400) * 4;
        });

        function showResult(s) {
            document.getElementById('final-time').innerText = s;
            document.getElementById('result-modal').style.display = 'flex';
        }

        async function saveResult() {
            const name = document.getElementById('user-name').value.trim();
            const score = parseFloat(document.getElementById('final-time').innerText);
            if (!name) return alert("请输入姓名！");

            const btn = document.querySelector('.submit-btn');
            btn.innerText = "上传中...";
            btn.disabled = true;

            try {
                const { error } = await sb.from('ranks').insert([{ nickname: name, score: score }]);
                if (error) throw error;
                alert("成绩提交成功！");
                location.reload();
            } catch (err) {
                alert("提交失败，请重试");
                btn.innerText = "重新提交";
                btn.disabled = false;
            }
        }

        // 处理屏幕尺寸变化
        window.addEventListener('resize', () => {
            app.renderer.resize(window.innerWidth, window.innerHeight);
            water.width = app.screen.width;
            water.height = app.screen.height;
            boat.x = app.screen.width / 2;
        });
    </script>
</body>
</html>
