<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>端午龙舟竞速挑战赛</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/pixi.js/7.2.4/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #0088cc; touch-action: none; font-family: "Microsoft YaHei", sans-serif; }
        
        /* 关键：强制 Canvas 撑满屏幕且不响应缩放干扰 */
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100% !important; 
            height: 100% !important; 
            z-index: 0; 
            display: block;
        }

        #ui-header { position: absolute; top: env(safe-area-inset-top, 10px); width: 100%; height: 80px; background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent); color: white; display: flex; justify-content: space-around; align-items: center; z-index: 10; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 12px; opacity: 0.8; }
        .stat-value { font-size: 24px; font-weight: bold; font-variant-numeric: tabular-nums; }

        .controls { position: fixed; bottom: 40px; left: 0; width: 100%; display: none; justify-content: space-around; padding: 0 15px; box-sizing: border-box; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .paddle-btn { width: 100px; height: 100px; background: #ff9f1c; color: white; border: none; border-radius: 50%; font-size: 18px; font-weight: bold; box-shadow: 0 6px 0 #e67e22; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation; }
        .paddle-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #e67e22; background: #f39c12; }

        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        #start-btn { padding: 15px 50px; font-size: 24px; font-weight: bold; color: white; background: #ff9f1c; border: none; border-radius: 50px; box-shadow: 0 6px 0 #e67e22; cursor: pointer; }
        #countdown { display: none; font-size: 100px; font-weight: bold; color: #fff; }
        
        #result-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10001; justify-content: center; align-items: center; }
        .modal-content { background: #fff; width: 85%; padding: 30px; border-radius: 20px; text-align: center; }
        .score-display { font-size: 48px; color: #e63946; font-weight: bold; margin: 20px 0; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 10px; font-size: 18px; box-sizing: border-box; }
        .submit-btn { width: 100%; background: #e63946; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="margin-bottom: 30px;">端午龙舟赛</h1>
        <button id="start-btn" onclick="preStart()">开始挑战</button>
        <div id="countdown">3</div>
    </div>

    <div id="ui-header">
        <div class="stat-item">
            <div class="stat-label">完成进度</div>
            <div class="stat-value"><span id="prog">0</span>%</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">用时</div>
            <div class="stat-value"><span id="time">0.00</span>s</div>
        </div>
    </div>

    <div class="controls" id="game-controls">
        <button class="paddle-btn" id="btn-left"><span>🚣</span><span>左桨</span></button>
        <button class="paddle-btn" id="btn-right"><span>🚣</span><span>右桨</span></button>
    </div>

    <div id="result-modal">
        <div class="modal-content">
            <h2>冲过终点！</h2>
            <div class="score-display"><span id="final-time">0.00</span>s</div>
            <input type="text" id="user-name" placeholder="请输入姓名" maxlength="6">
            <button class="submit-btn" onclick="saveResult()">提交成绩</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hnppuispiploxwqwdfvm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_DaDWwW3v6QFfvRs-HvbzMA_fT8W_jsx';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const TOTAL_DIST = 4000; 
        let distance = 0, speed = 0, startTime = 0, lastSide = '', finished = false, isGaming = false;

        // 核心优化：固定 resolution 为 1，解决移动端逻辑像素与渲染像素不一致导致的消失
        const app = new PIXI.Application({
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundColor: 0x0088cc,
            antialias: true,
            resolution: 1, 
            autoDensity: true
        });
        document.body.appendChild(app.view);

        // --- 1. 背景：动态水流样式 (纯代码生成纹理，免加载极速渲染) ---
        const waterGraphic = new PIXI.Graphics();
        waterGraphic.beginFill(0x0077be); // 基础蓝色水面
        waterGraphic.drawRect(0, 0, 512, 512);
        waterGraphic.endFill();
        
        // 绘制交错的动态波浪
        waterGraphic.lineStyle(3, 0x33aaff, 0.5);
        for (let y = 0; y < 512; y += 128) {
            waterGraphic.moveTo(0, y + 64);
            waterGraphic.quadraticCurveTo(128, y, 256, y + 64);
            waterGraphic.quadraticCurveTo(384, y + 128, 512, y + 64);
        }
        waterGraphic.lineStyle(2, 0x005c99, 0.4);
        for (let y = 64; y < 512; y += 128) {
            waterGraphic.moveTo(0, y + 64);
            waterGraphic.quadraticCurveTo(128, y + 128, 256, y + 64);
            waterGraphic.quadraticCurveTo(384, y, 512, y + 64);
        }
        const waterTexture = app.renderer.generateTexture(waterGraphic);
        const water = new PIXI.TilingSprite(waterTexture, app.screen.width, app.screen.height);
        app.stage.addChild(water);

        // --- 2. 终点线样式 ---
        const finishLine = new PIXI.Container();
        const flGraphics = new PIXI.Graphics();
        const flWidth = 3000; // 极宽，确保适配任何比例屏幕
        const flHeight = 40;
        // 黑白相间格子
        for(let y = 0; y < flHeight; y += 10) {
            for(let x = 0; x < flWidth; x += 10) {
                flGraphics.beginFill((x/10 + y/10) % 2 === 0 ? 0xffffff : 0x000000);
                flGraphics.drawRect(x, y, 10, 10);
                flGraphics.endFill();
            }
        }
        flGraphics.x = -flWidth / 2; // 居中偏移对齐
        
        // 终点标识字
        const flText = new PIXI.Text('终    点', {
            fontFamily: '"Microsoft YaHei", sans-serif',
            fontSize: 28,
            fill: 0xff0000,
            fontWeight: 'bold',
            stroke: 0xffffff,
            strokeThickness: 4,
            dropShadow: true,
            dropShadowColor: 0x000000,
            dropShadowDistance: 2,
            dropShadowAlpha: 0.5
        });
        flText.anchor.set(0.5);
        flText.y = flHeight / 2;

        finishLine.addChild(flGraphics, flText);
        finishLine.y = -200; // 初始隐藏在屏幕外
        app.stage.addChild(finishLine);

        // --- 3. 龙舟绘制：更加真实的图形 ---
        const boat = new PIXI.Container();
        
        // 船底水波阴影（增加立体漂浮感）
        const shadow = new PIXI.Graphics();
        shadow.beginFill(0x000000, 0.2).drawEllipse(0, 0, 30, 90).endFill();
        boat.addChild(shadow);

        // 船身主体 (木质感)
        const body = new PIXI.Graphics();
        body.beginFill(0xb35900) // 深木色
            .drawPolygon([-16, -70, 16, -70, 20, 70, -20, 70])
            .endFill();
        // 船板纹路
        body.lineStyle(1, 0x804000, 0.8);
        for(let i = -60; i < 60; i += 15) {
            body.moveTo(-17, i); body.lineTo(17, i);
        }
        // 两侧红漆边缘
        body.lineStyle(3, 0xcc0000).moveTo(-16, -70).lineTo(-20, 70);
        body.lineStyle(3, 0xcc0000).moveTo(16, -70).lineTo(20, 70);
        boat.addChild(body);

        // 龙船头
        const head = new PIXI.Graphics();
        head.beginFill(0x00b33c) // 翠绿龙头
            .drawPolygon([-18, -70, 18, -70, 14, -105, -14, -105])
            .endFill();
        head.beginFill(0xe60000).drawRect(-10, -115, 20, 15).endFill(); // 红嘴
        head.lineStyle(4, 0xffcc00).moveTo(-10, -95).lineTo(-30, -110); // 左龙须
        head.lineStyle(4, 0xffcc00).moveTo(10, -95).lineTo(30, -110);  // 右龙须
        head.beginFill(0xffffff).drawCircle(-8, -92, 5).drawCircle(8, -92, 5).endFill(); // 眼白
        head.beginFill(0x000000).drawCircle(-8, -93, 2).drawCircle(8, -93, 2).endFill(); // 瞳孔
        boat.addChild(head);

        // 龙船尾
        const tail = new PIXI.Graphics();
        tail.beginFill(0x00b33c).drawPolygon([-18, 70, 18, 70, 0, 105]).endFill();
        tail.lineStyle(3, 0xffcc00).moveTo(0, 70).lineTo(0, 100);
        boat.addChild(tail);

        // 击鼓手与大鼓
        const drum = new PIXI.Graphics();
        drum.beginFill(0x8b0000).drawCircle(0, -45, 14).endFill(); // 鼓身
        drum.beginFill(0xffebcd).drawCircle(0, -45, 10).endFill(); // 鼓面
        drum.beginFill(0xffcc99).drawCircle(0, -20, 7).endFill();  // 鼓手头
        drum.beginFill(0x0066cc).drawRect(-10, -13, 20, 15).endFill(); // 鼓手身体
        boat.addChild(drum);

        app.stage.addChild(boat);

        // 初始设置位置
        function resetBoatPosition() {
            boat.x = app.screen.width / 2;
            boat.y = app.screen.height * 0.7; // 放在屏幕 70% 的高度处
        }
        resetBoatPosition();

        function preStart() {
            document.getElementById('start-btn').style.display = 'none';
            const cd = document.getElementById('countdown');
            cd.style.display = 'block';
            let count = 3;
            let timer = setInterval(() => {
                count--;
                if(count > 0) cd.innerText = count;
                else if(count === 0) cd.innerText = "GO!";
                else { clearInterval(timer); startGame(); }
            }, 1000);
        }

        function startGame() {
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('ui-header').style.opacity = '1';
            const ctrl = document.getElementById('game-controls');
            ctrl.style.display = 'flex';
            setTimeout(() => { ctrl.style.opacity = '1'; ctrl.style.pointerEvents = 'auto'; }, 50);
            isGaming = true;
            finished = false;
            distance = 0;
            speed = 0;
            startTime = Date.now();
        }

        function handlePaddle(side) {
            if (!isGaming) return; // 注意：去掉了 finished 的判定，允许冲线后点击无判定但不会报错
            if (side !== lastSide) {
                speed += 7.0; 
                boat.scale.set(1.1, 0.9);
            } else {
                speed += 0.5; 
            }
            lastSide = side;
        }

        document.getElementById('btn-left').addEventListener('pointerdown', (e) => { e.preventDefault(); handlePaddle('left'); });
        document.getElementById('btn-right').addEventListener('pointerdown', (e) => { e.preventDefault(); handlePaddle('right'); });

        // 游戏主循环
        app.ticker.add(() => {
            // 动态纠正居中
            boat.x = app.screen.width / 2;
            finishLine.x = app.screen.width / 2;
            
            if (!isGaming && !finished) {
                boat.y = app.screen.height * 0.7;
                return;
            }

            // 无论游戏中还是滑行中，水面依然在模拟流动
            speed *= 0.95; 
            distance += speed;
            water.tilePosition.y += speed; 

            // 计算终点线逻辑 (距离剩余不足一屏幕时，出现终点线)
            const distanceRemaining = TOTAL_DIST - distance;
            if (distanceRemaining < app.screen.height && distanceRemaining > -app.screen.height) {
                finishLine.y = boat.y - distanceRemaining;
            } else if (distanceRemaining <= -app.screen.height) {
                finishLine.y = app.screen.height + 200; // 完全移出画面下方
            }

            const now = (Date.now() - startTime) / 1000;
            
            // 未完成时的进度和计时器更新
            if (!finished) {
                document.getElementById('time').innerText = now.toFixed(2);
                document.getElementById('prog').innerText = Math.floor(Math.min(100, (distance / TOTAL_DIST) * 100));
                
                // 触发冲线判定
                if (distance >= TOTAL_DIST) {
                    finished = true;
                    document.getElementById('prog').innerText = "100";
                    
                    // 隐藏下方控制板
                    document.getElementById('game-controls').style.opacity = '0';
                    document.getElementById('game-controls').style.pointerEvents = 'none';

                    // 记录准确的冲线耗时
                    const finalTimeStr = now.toFixed(2);

                    // 延迟 1.5 秒弹出结算框，给予龙舟一个“冲刺过线”的视觉余量时间
                    setTimeout(() => {
                        isGaming = false;
                        showResult(finalTimeStr);
                    }, 1500);
                }
            }

            // 龙舟弹性恢复动画
            boat.scale.x += (1 - boat.scale.x) * 0.1;
            boat.scale.y += (1 - boat.scale.y) * 0.1;
            // 左右轻微摆动
            boat.x += Math.sin(Date.now() / 200) * 2;

            // 冲线后动画：龙舟不再固定在 70% 高度，而是顺着惯性向前（屏幕上方）冲刺出画
            if (finished) {
                boat.y -= speed * 0.4;
            }
        });

        function showResult(s) {
            document.getElementById('final-time').innerText = s;
            document.getElementById('result-modal').style.display = 'flex';
        }

        async function saveResult() {
            const name = document.getElementById('user-name').value.trim();
            const score = parseFloat(document.getElementById('final-time').innerText);
            
            if (!name) return alert("请输入姓名！");

            try {
                // 1. 检查是否存在重复姓名
                const { data: existingUser, error: checkError } = await sb
                    .from('ranks')
                    .select('nickname')
                    .eq('nickname', name)
                    .maybeSingle(); 

                if (checkError) throw checkError;

                if (existingUser) {
                    return alert("该姓名已经提交过，不能重复提交！");
                }

                // 2. 如果不存在重复，则执行插入
                const { error: insertError } = await sb
                    .from('ranks')
                    .insert([{ nickname: name, score: score }]);

                if (insertError) throw insertError;

                alert("提交成功！");
                location.reload();
            } catch (err) { 
                console.error(err);
                alert("提交失败，请重试"); 
            }
        }

        // 监听窗口尺寸变化
        window.addEventListener('resize', () => {
            app.renderer.resize(window.innerWidth, window.innerHeight);
            water.width = app.screen.width;
            water.height = app.screen.height;
            if(!finished) resetBoatPosition();
        });
    </script>
</body>
</html>
